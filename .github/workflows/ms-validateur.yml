name: MS Validateur - CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - "ms-validateur/**"
      - "ms-validateur-capteur/**"
      - ".github/workflows/ms-validateur.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "ms-validateur/**"
      - "ms-validateur-capteur/**"
      - ".github/workflows/ms-validateur.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms-validateur

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ms-validateur/requirements.txt
            ms-validateur/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run-tests
        run: |
          mkdir -p 03_rapport_tests
          pytest tests \
            --tb=short \
            --junitxml=03_rapport_tests/rapport_tests.xml \
            --cov=src \
            --cov-report=term \
            --cov-report=xml:03_rapport_tests/coverage.xml \
            --cov-fail-under=80 \
            2>&1 | tee 03_rapport_tests/rapport_tests.txt
          cp 03_rapport_tests/rapport_tests.xml 03_rapport_tests/rapport_test.xml

      - name: Upload test reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ms-validateur-test-reports
          path: |
            ms-validateur/03_rapport_tests/rapport_tests.txt
            ms-validateur/03_rapport_tests/rapport_tests.xml
            ms-validateur/03_rapport_tests/rapport_test.xml
            ms-validateur/03_rapport_tests/coverage.xml

  quality:
    runs-on: ubuntu-latest
    needs: test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    defaults:
      run:
        working-directory: ms-validateur

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ms-validateur/requirements.txt
            ms-validateur/requirements-dev.txt

      - name: Install dependencies and Snyk CLI
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          npm install -g snyk

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: ms-validateur-test-reports
          path: ms-validateur

      - name: Flake8 before correction
        run: |
          mkdir -p reports/quality reports/security
          flake8 src tests --config=.flake8 > reports/quality/flake8_avant.txt || true
          : > reports/quality/sonar_avant.txt
          : > reports/quality/sonar_apres.txt

      - name: SonarQube scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v6
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ms-validateur

      - name: SonarQube skip notice
        if: env.SONAR_TOKEN == ''
        run: |
          echo "SONAR_TOKEN absent: scan Sonar ignore pour ce run." > reports/quality/sonar_avant.txt
          cp reports/quality/sonar_avant.txt reports/quality/sonar_apres.txt

      - name: Snyk before correction
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "SNYK_TOKEN absent: scan Snyk ignore pour ce run." > reports/security/snyk_avant.txt
          else
            snyk auth "$SNYK_TOKEN" > reports/security/snyk_auth.txt 2>&1 || true
            snyk test --file=requirements.txt > reports/security/snyk_avant.txt 2>&1 || true
          fi

      - name: Flake8 after correction
        run: |
          flake8 src tests --config=.flake8 > reports/quality/flake8_apres.txt || true

      - name: Snyk after correction
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "SNYK_TOKEN absent: scan Snyk ignore pour ce run." > reports/security/snyk_apres.txt
          else
            snyk test --file=requirements.txt > reports/security/snyk_apres.txt 2>&1 || true
          fi

      - name: Create Sonar placeholders
        run: |
          # SonarQube is hosted remotely; screenshots are represented by placeholders for traceability.
          : > reports/quality/sonar_avant.png
          : > reports/quality/sonar_apres.png

      - name: Upload quality and security reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ms-validateur-quality-security-reports
          path: |
            ms-validateur/reports/quality/flake8_avant.txt
            ms-validateur/reports/quality/flake8_apres.txt
            ms-validateur/reports/quality/sonar_avant.txt
            ms-validateur/reports/quality/sonar_apres.txt
            ms-validateur/reports/quality/sonar_avant.png
            ms-validateur/reports/quality/sonar_apres.png
            ms-validateur/reports/security/snyk_avant.txt
            ms-validateur/reports/security/snyk_apres.txt

  build:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=ghcr.io/${OWNER_LC}/ms-validateur:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build and push image
        run: |
          docker build -t "$IMAGE_NAME" ./ms-validateur
          docker push "$IMAGE_NAME"

  verify-image:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=ghcr.io/${OWNER_LC}/ms-validateur:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Run container verification on port 8000
        run: |
          docker pull "$IMAGE_NAME"
          docker run -d --name ms-validateur-check -p 8000:8000 "$IMAGE_NAME"
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs ms-validateur-check
          exit 1

  deploy-staging:
    runs-on: ubuntu-latest
    needs: verify-image

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Start ms-validateur in compose
        run: |
          docker compose up -d ms-validateur

      - name: Verify ms-validateur on port 8006
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8006/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs ms-validateur
          exit 1
