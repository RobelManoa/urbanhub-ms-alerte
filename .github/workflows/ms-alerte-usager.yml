name: MS Alerte Usager - CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths: [ 'ms-alerte-usager/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'ms-alerte-usager/**' ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12.3"
      PYTHONPATH: ${{ github.workspace }}/ms-alerte-usager
    defaults:
      run:
        working-directory: ms-alerte-usager

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests + coverage
        run: |
          pytest test/unit --junitxml=report_tests.xml --cov=src --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=80

      - name: Lint flake8
        run: |
          flake8 src test --config=.flake8 --output-file=flake8-report.txt

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ startsWith(secrets.SONAR_HOST_URL, 'http') && secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: ms-alerte-usager

      - name: Snyk Security Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=ms-alerte-usager/requirements.txt --severity-threshold=high --fail-on=all